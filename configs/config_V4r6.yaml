#=====================================================================
#
# config_V4r6.yaml
#
# ECCO Dataset Production configuration/lookup parameters
#
#=====================================================================

#---------------------------------------------------------------------
# ECCO version and filename-associated strings
#---------------------------------------------------------------------

# Short name of ECCO product version/release:

ecco_version: 'V4r6'

# Long name of ECCO product version/release:
# This string is (only) used to set the 'product_version' global attribute in
# the final output dataset(s).
# Though the following value has been set by PO.DAAC/NASA Earthdata for the
# general distribution case, it can take on any value that is most meaningful in
# other contexts.

product_version: 'Version 4, Release 6'

# ECCO dataset filestring component, for either 'latlon' or 'native'
# dataproducts.  Used by the ECCOGranuleFilestr class to set the 'grid_label'
# portion of the dataset filestring, formatted according to:
# <prefix>_<averaging_period>_<date>_ECCO_<version>_<grid_type>_<grid_label>.nc.
# (Note: Name follows ECCO-v4-Configurations package conventions.)

ecco_production_filestr_grid_label:
    latlon: '0p50deg'
    native: 'llc0090'

#---------------------------------------------------------------------
# ECCO solution parameters:
#---------------------------------------------------------------------

# ecco granule variable precision (default: float64):
array_precision: 'float32'

# Model start date and time, in ISO date time format
# ('YYYY-MM-DDThh:mm:ss'):
model_start_time: '1992-01-01T12:00:00'

# Model end date and time, in ISO date time format
# ('YYYY-MM-DDThh:mm:ss'):
model_end_time: '2025-12-31T12:00:00'

# Model timestep units (per numpy datetime64 conventions, i.e.,
# hours('h'), minutes ('s'), seconds ('s'), etc.), and corresponding
# number of simulation timesteps units per granule time increment
# (e.g., 1 'h' per granule timestep increment):
model_timestep_units: 'h'
model_timestep: 1

# Number of vertical of 3D fields (one (1) vertical level assumed for
# 2D files):
num_vertical_levels: 50

# Maximum model depth (meters):
geospatial_vertical_min: -6134.5

#---------------------------------------------------------------------
# Mapping factors generation parameters:
# Note: Grid file paths and mapping factors directory are specified
# as command-line arguments to the tools that need them.
#---------------------------------------------------------------------

# Resolution of the lat-lon grid used for transformation (degrees):
latlon_grid_resolution: 0.5

# Area extent for lat-lon grid [lon_min, lat_max, lon_max, lat_min]:
latlon_grid_area_extent: [-180.0, 90.0, 180.0, -90.0]

# Effective target grid cell radius for mapping (km).
# If not specified (null), defaults to: (111/2)*sqrt(2) ≈ 78.5 km
latlon_effective_grid_radius: null

# Specify method for calculating 'effective target grid cell radius' for mapping factors generation, if latlon_effective_grid_radius is not specified (null):
#   Method 1: (used in V4r4) spatially-varying.  The radius of a circle with the same area as each lat-lon grid cell.
#   Method 2: spatially-invariant, X km. X is the distance from the center of a square grid cell with sides of length L = 111 km *{latlon_grid_resolution} to a corner.
#          ... where L is approximately the length of a side of a square lat-lon cell at {latlon_grid_resolution} degree resolution at the equator.
#          ... i.e. latlon_effective_grid_radius = sqrt(2) * 111 km * {latlon_grid_resolution} / 2
latlon_grid_radius_method: 'method_1'  # options are 'method_1' or 'method_2'

# Use custom grid and factors (false = use ECCO grids):
custom_grid_and_factors: false
#---------------------------------------------------------------------
# Metadata, variable encodings:
#---------------------------------------------------------------------

# PO.DAAC metadata source:
podaac_metadata_filename: 'PODAAC_dataset_table_V4r6_prelim.csv'

# History string to include with global metadata:
history: 'ECCO V4r6, preliminary granule generation test 2026-03-17'

# References string to include with global metadata:
references: 'ECCO Consortium, Fukumori, I., Wang, O., Fenty, I., Forget, G., Heimbach, P., & Ponte, R. M. 2026. Synopsis of the ECCO Central Production Global Ocean and Sea-Ice State Estimate (Version 4 Release 6). doi:10.5281/zenodo.3765928'

# Source string to include with global metadata:
source: 'The ECCO V4r6 ocean state estimate was produced by fitting a free-running solution of the MITgcm (checkpoint 66g) to satellite and in situ observational data in a least squares sense using the adjoint method.'

# Summary string to include with global metadata:
# Note: the final dataset 'summary' metadata field is as follows:
#    dataset_desription_head + grouping['name'] + dataset_description_tail + summary
#    i.e. "This dataset contains daily-averaged" + {grouping['name']} + {dataset_description_tail} + {summary}
summary: 'Estimating the Circulation and Climate of the Ocean (ECCO) state estimates are dynamically and kinematically-consistent reconstructions of the three-dimensional, time-evolving ocean, sea-ice, and surface atmospheric states. ECCO V4r6 is a free-running solution of a global, nominally 1-degree configuration of the MIT general circulation model (MITgcm) that has been fit to observations in a least-squares sense. Observational data constraints used in V4r6 include sea surface height (SSH) from satellite altimeters [ERS-1/2, TOPEX/Poseidon, GFO, ENVISAT, Jason-1,2,3, CryoSat-2, and SARAL/AltiKa]; sea surface temperature (SST) from satellite radiometers [AVHRR], sea surface salinity (SSS) from the Aquarius satellite radiometer/scatterometer, ocean bottom pressure (OBP) from the GRACE satellite gravimeter; sea-ice concentration from satellite radiometers [SSM/I and SSMIS], and in-situ ocean temperature and salinity measured with conductivity-temperature-depth (CTD) sensors and expendable bathythermographs (XBTs) from several programs [e.g., WOCE, GO-SHIP, Argo, and others] and platforms [e.g., research vessels, gliders, moorings, ice-tethered profilers, and instrumented pinnipeds]. V4r6 covers the period 1992-01-01T12:00:00 to 2025-12-31T12:00:00.'

# variable-level NetCDF4 compression encodings:
netcdf4_compression_encodings:
    zlib        : True
    complevel   : 5
    shuffle     : True

# per PO.DAAC request, possible coordinate names to be included with
# variable encodings (runtime-determined):
variable_coordinates_as_encoded_attributes: ['latitude','longitude','tile','time','XC','XG','YC','YG','Z','Zp1','Zl','Zu']

# Assigned DOI prefix (ref. https://www.doi.org/):
doi_authority: 'org.doi'
doi_prefix: '10.5067'

# Tail string for the dataset description for 1D grid
dataset_description_tail_1D: ''

# Tail string for the dataset description for latlon grid
dataset_description_tail_latlon: ' interpolated to a regular 0.5-degree grid from the ECCO Version 4 Release 6 (V4r6) ocean and sea-ice state estimate.'

# Tail string for the dataset description for native grid
dataset_description_tail_native: ' on the native Lat-Lon-Cap 90 (LLC90) model grid from the ECCO Version 4 Release 6 (V4r6) ocean and sea-ice state estimate.'

