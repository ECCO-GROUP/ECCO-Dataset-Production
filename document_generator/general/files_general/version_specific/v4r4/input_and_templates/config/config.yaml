coordinate_files_latlon_dir: files_general/version_specific/v4r4/granules/coordinate_granules/granules_latlon
#
variable_files_native_dir: files_general/version_specific/v4r4/granules/variable_granules/granules_native
variable_files_latlon_dir: files_general/version_specific/v4r4/granules/variable_granules/granules_latlon
