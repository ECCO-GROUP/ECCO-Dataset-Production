# This is the static configuration file for the ECCO document generator product; it should be provided to the user with each ECCO release
# All paths are relative to the "utilities" directory in the base document generator directory


remote_server_hostname: urs.earthdata.nasa.gov

url_grid_type_substrings:
  - _native
  - _latlon
  - _1D

url_coordinate_substring: GRID_GEOMETRY

possible_grid_types:
  - latlon
  - native
  - 1D

possible_granule_types:
  - coordinate
  - variable


global_attributes_json_file: files_general/version_specific/v4r4/input_and_templates/json/attribute_files/global_attributes.json
global_attributes_tex_file: files_general/version_specific/v4r4/input_and_templates/latex/support_files/global_attributes.tex
#
variable_attributes_json_file: files_general/version_specific/v4r4/input_and_templates/json/attribute_files/variable_attributes.json
variable_attributes_tex_file: files_general/version_specific/v4r4/input_and_templates/latex/support_files/variable_attributes.tex

example_latlon_table_tex_file: files_general/version_specific/v4r4/runtime_generated/latex/example_latlon_table.tex
example_native_table_tex_file: files_general/version_specific/v4r4/runtime_generated/latex/example_native_table.tex
example_1D_table_tex_file: files_general/version_specific/v4r4/runtime_generated/latex/example_1D_table.tex


groupings_coordinate_native_json_file: files_general/version_specific/v4r4/input_and_templates/json/wecandobetter/native_coords.json
