# This is the static configuration file for the ECCO document generator product; it should be provided to the user with each ECCO release
# All paths are relative to the "utilities" directory in the base document generator directory


remote_server_hostname: urs.earthdata.nasa.gov

url_grid_type_substrings:
  - _native
  - _latlon
  - _1D

url_coordinate_substring: GRID_GEOMETRY

possible_grid_types:
  - latlon
  - native
  - 1D

possible_granule_types:
  - coordinate
  - variable

table_section_titles:
  coordinate_native: "Native lat-lon-cap 90 (llc90) Coordinates and Grid Geometry"
  coordinate_latlon: "Lat-Lon Coordinates and Grid Geometry" 
  variable_native: "Native Dataset Groupings"
  variable_latlon: "Lat-Lon Dataset Groupings"
  variable_1D: "1-D Dataset Groupings"


global_attributes_json_file: document_files/v4r4/static/json/attribute_files/global_attributes.json
global_attributes_tex_file: document_files/v4r4/static/latex/support_files/global_attributes.tex
#
variable_attributes_json_file: document_files/v4r4/static/json/attribute_files/variable_attributes.json
variable_attributes_tex_file: document_files/v4r4/static/latex/support_files/variable_attributes.tex

example_latlon_table_tex_file: document_files/v4r4/user_generated/latex/example_latlon_table.tex
example_native_table_tex_file: document_files/v4r4/user_generated/latex/example_native_table.tex
example_1D_table_tex_file: document_files/v4r4/user_generated/latex/example_1D_table.tex


groupings_coordinate_native_json_file: document_files/v4r4/static/json/wecandobetter/native_coords.json
groupings_coordinate_latlon_json_file: document_files/v4r4/static/json/wecandobetter/latlon_coords.json
#
groupings_variable_native_json_file: document_files/v4r4/static/json/groupings/ECCOv4r4_groupings_for_native_datasets.json
groupings_variable_latlon_json_file: document_files/v4r4/static/json/groupings/ECCOv4r4_groupings_for_latlon_datasets.json
groupings_variable_1D_json_file: document_files/v4r4/static/json/groupings/ECCOv4r4_groupings_for_1D_datasets.json


coordinate_files_native_dir: document_files/v4r4/granules/coordinate_granules/coordinate_granules_native
coordinate_files_latlon_dir: document_files/v4r4/granules/coordinate_granules/coordinate_granules_latlon
#
variable_files_native_dir: document_files/v4r4/granules/variable_granules/granules_native
variable_files_latlon_dir: document_files/v4r4/granules/variable_granules/granules_latlon
variable_files_1D_dir: document_files/v4r4/granules/variable_granules/granules_1D


