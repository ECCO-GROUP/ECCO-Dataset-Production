#
figures_variable_native_dir: document_files/v4r4/user_generated/figures/figures_variables_native 
figures_variable_latlon_dir: document_files/v4r4/user_generated/figures/figures_variables_latlon 
figures_variable_1D_dir: document_files/v4r4/user_generated/figures/figures_variables_1D 


