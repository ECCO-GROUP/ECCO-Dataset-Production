# ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
# README:
# In this configuration file, the user specifies remote server paths (e.g. https://archive.podaac.earthdata.nasa.gov/podaac-ops-cumulus-protected/ECCO_L4_VARIABLE.nc").
# Note that, to use data on grids other than the 1D grid (i.e. the native grid or the latlon grid), a "(native/latlon)_coordinate_file_path_remote" must be specified as well.
# ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^


# ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------
# Remote server paths to ECCO files which use the "latlon" grid
# ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------
latlon_coordinate_file_paths_remote: 
  - https://archive.podaac.earthdata.nasa.gov/podaac-ops-cumulus-protected/ECCO_L4_GEOMETRY_05DEG_V4R4/GRID_GEOMETRY_ECCO_V4r4_latlon_0p50deg.nc
# ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------
latlon_variable_file_paths_remote:
